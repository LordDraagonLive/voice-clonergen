syntax = "proto3";

package personalvoicecloner.inference.v1;

option go_package = "personal-voice-cloner/apps/api/internal/rpc/inferencev1";

service InferenceService {
  rpc Generate(GenerateRequest) returns (GenerateResponse);
  rpc Benchmark(BenchmarkRequest) returns (BenchmarkResponse);
}

message GenerateRequest {
  string model_name = 1;
  string text = 2;
  string reference_audio_path = 3;
  optional string reference_text = 4;
  string output_path = 5;
  optional string language = 6;
  optional string style_prompt = 7;
}

message GenerateResponse {
  string output_path = 1;
  int64 latency_ms = 2;
  double realtime_factor = 3;
  string model_name = 4;
  int32 sample_rate = 5;
  double duration_seconds = 6;
}

message BenchmarkRequest {
  repeated string model_names = 1;
  string text = 2;
  string reference_audio_path = 3;
  optional string reference_text = 4;
  optional string language = 5;
  optional string style_prompt = 6;
}

message BenchmarkResponse {
  repeated GenerateResponse results = 1;
}
