name: personal-voice-cloner

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: voice_cloner
      POSTGRES_USER: voice
      POSTGRES_PASSWORD: voice
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./apps/api/internal/db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file: .env.example
    environment:
      HTTP_ADDR: :8080
    ports:
      - "${API_PORT:-8081}:8080"
    depends_on:
      - postgres
      - redis
    volumes:
      - audio-data:/data/audio

  inference-worker:
    build:
      context: .
      dockerfile: infra/docker/inference-worker.Dockerfile
    env_file: .env.example
    depends_on:
      - redis
    volumes:
      - audio-data:/data/audio

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    environment:
      VITE_API_URL: http://localhost:${API_PORT:-8081}
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres-data:
  minio-data:
  audio-data:
